---
name: CI

# yamllint disable-line rule:truthy
on:
    pull_request:
    push:
        branches: ['**']
    release:
        types: [published]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
    cancel-in-progress: true

jobs:
    cargo-build:
        name: Cargo Build
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: cargo build
              run: cargo b --workspace --all-targets --all-features

    cargo-fmt:
        name: Cargo fmt
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  components: rustfmt
            - name: Rustfmt Check
              run: cargo fmt --all --check

    cargo-clippy:
        name: Cargo clippy
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  components: clippy
            - name: Clippy Check
              run: cargo clippy --all-targets

    cargo-doc:
        name: Cargo doc
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: Cargo doc test
              run: cargo doc --workspace --all-features --no-deps

    cargo-next-test:
        name: Cargo test
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: Install cargo-nextest
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-nextest
            - name: Cargo test
              run: >-
                  cargo nextest run --workspace --all-targets --all-features
                  --no-tests=pass

    typos-cli:
        name: typos
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install Typos
              uses: taiki-e/install-action@v2
              with:
                  tool: typos-cli
            - name: run typos
              run: typos

    taplo-toml-fmt:
        name: taplo fmt
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install Taplo
              uses: taiki-e/install-action@v2
              with:
                  tool: taplo-cli
            - name: Run Taplo
              id: taplo
              run: taplo fmt --check --diff

    yamlfmt:
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: false
            - name: Install yamlfmt
              run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
            - name: Run yamlfmt
              run: yamlfmt .

    cargo-publish:
        name: Publish ogn-aprs-parser
        needs:
            - cargo-build
            - cargo-fmt
            - cargo-clippy
            - cargo-doc
            - cargo-next-test
            - typos-cli
            - taplo-toml-fmt
            - yamlfmt
        if: github.event_name == 'release' && contains(github.event.release.tag_name, 'ogn-aprs-parser@')
        runs-on: ubuntu-latest
        environment:
            name: crates-io-release
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4

            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1

            - name: Verify Tag and Version
              shell: bash
              run: |
                  REF_NAME="${{ github.ref }}"
                  TAG_VERSION=${REF_NAME##*@v}

                  CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="ogn-aprs-parser") | .version')

                  echo "Parsed Tag Version: $TAG_VERSION"
                  echo "Cargo.toml Version: $CARGO_VERSION"

                  if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
                    echo "Version missmatch. Tag: $TAG_VERSION, Cargo: $CARGO_VERSION"
                    exit 1
                  fi

            - name: Publish core crate
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
              run: cargo publish -p ogn-aprs-parser
