---
name: CI

# yamllint disable-line rule:truthy
on:
    pull_request:
    push:
        branches: ['**']
    release:
        types: [published]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
    cancel-in-progress: true

jobs:
    cargo-build:
        name: Cargo Build
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: cargo build
              run: cargo b --workspace --all-targets --all-features

    cargo-fmt:
        name: Cargo fmt
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  components: rustfmt
            - name: Rustfmt Check
              run: cargo fmt --all --check

    cargo-clippy:
        name: Cargo clippy
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  components: clippy
            - name: Clippy Check
              run: cargo clippy --all-targets

    cargo-doc:
        name: Cargo doc
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: Cargo doc test
              run: cargo doc --workspace --all-features --no-deps

    cargo-next-test:
        name: Cargo test
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: Install cargo-nextest
              uses: taiki-e/install-action@v2
              with:
                  tool: cargo-nextest
            - name: Cargo test
              run: >-
                  cargo nextest run --workspace --all-targets --all-features
                  --no-tests=pass

    typos-cli:
        name: typos
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install Typos
              uses: taiki-e/install-action@v2
              with:
                  tool: typos-cli
            - name: run typos
              run: typos

    taplo-toml-fmt:
        name: taplo fmt
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - name: Install Taplo
              uses: taiki-e/install-action@v2
              with:
                  tool: taplo-cli
            - name: Run Taplo
              id: taplo
              run: taplo fmt --check --diff

    yamlfmt:
        runs-on: ubuntu-latest
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: stable
                  cache: false
            - name: Install yamlfmt
              run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
            - name: Run yamlfmt
              run: yamlfmt .

    cargo-publish:
        name: Publish ${{ matrix.package }}
        needs: [cargo-build, cargo-fmt, cargo-clippy, cargo-next-test]
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - package: ogn-aprs-parser
                      tag_prefix: ogn-aprs-parser@v
                    - package: ogn-aprs-parser-pyo3
                      tag_prefix: ogn-aprs-parser-pyo3@v

        environment:
            name: crates-io-release
        steps:
            - name: Fetch Repository
              uses: actions/checkout@v4
              if: github.event_name == 'release' && startsWith(github.event.release.tag_name, matrix.tag_prefix)

            - name: Check valid tag prefix
              id: check
              run: |
                  if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.tag_name }}" == ${{ matrix.tag_prefix }}* ]]; then
                    echo "match=true" >> $GITHUB_OUTPUT
                  else
                    echo "match=false" >> $GITHUB_OUTPUT
                  fi

            - name: Install stable toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              if: steps.check.outputs.match == 'true'

            - name: Verify Tag and Version
              shell: bash
              if: steps.check.outputs.match == 'true'
              run: |
                  TAG_NAME="${{ github.event.release.tag_name }}"
                  TAG_VERSION=${TAG_NAME#"${{ matrix.tag_prefix }}"}

                  CARGO_VERSION=$(cargo metadata --format-version 1 --no-deps | \
                    jq -r --arg PKG "${{ matrix.package }}" '.packages[] | \
                    select(.name==$PKG) | \
                    .version')

                  echo "Package: ${{ matrix.package }}"
                  echo "Parsed Tag Version: $TAG_VERSION"
                  echo "Cargo.toml Version: $CARGO_VERSION"

                  if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
                    echo "Version mismatch!"
                    exit 1
                  fi

            - name: Publish crate
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
              if: steps.check.outputs.match == 'true'
              run: cargo publish -p ${{ matrix.package }}
