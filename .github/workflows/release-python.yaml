---
name: Release and Publish

# yamllint disable-line rule:truthy
on:
    release:
        types: [published]

jobs:
    run-ci:
        uses: ../ci.yml

    build-wheels:
        name: Build Wheels (${{ matrix.os }})
        needs: [run-ci]
        if: startsWith(github.event.release.tag_name, 'ogn-aprs-parser-pyo3@v')
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4
            - name: Build Wheels
              uses: PyO3/maturin-action@v1
              with:
                  target: ${{ matrix.target }}
                  args: --release --out dist -m ogn-aprs-parser-pyo3/Cargo.toml ${{ matrix.os == 'macos-latest' && '--universal2' || '' }}
                  sccache: 'true'
            - name: Upload Wheels
              uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}
                  path: dist

    publish-pypi:
        name: Publish to PyPI
        needs: [build-wheels]
        runs-on: ubuntu-latest
        environment:
            name: pypi-release
        permissions:
            id-token: write  # Required for OIDC token exchange - trusted publishing on PyPI
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: 0.11.2

            - name: Download All Wheels
              uses: actions/download-artifact@v4
              with:
                  pattern: wheels-*
                  merge-multiple: true
                  path: dist

            - name: Build Source Distribution (sdist)
              run: uv build --package ogn-aprs-parser-pyo3

            - name: Publish to PyPI
              env:
                  UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
              run: uv publish dist/*

    publish-cargo:
        name: Publish to Crates.io
        needs: [publish-pypi]  # Ensures we don't publish the crate if PyPI upload failed
        runs-on: ubuntu-latest
        environment:
            name: crates-io-release
        steps:
            - uses: actions/checkout@v4
            - uses: actions-rust-lang/setup-rust-toolchain@v1
            - name: Cargo Publish
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
              run: cargo publish -p ogn-aprs-parser-pyo3
