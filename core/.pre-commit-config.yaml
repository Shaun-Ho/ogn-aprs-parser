---
repos:
    - repo: local
      hooks:
          - id: rust-linting
            name: Rust linting
            entry: cargo fmt --all --
            pass_filenames: true
            types: [file, rust]
            language: system
          - id: rust-clippy
            name: Rust clippy
            entry: >-
                cargo clippy --all-targets
            pass_filenames: false
            types: [file, rust]
            language: system
